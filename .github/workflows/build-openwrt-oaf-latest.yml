name: Build OpenWrt-x86_64 (Seed Reuse + Latest OAF)

on:
  workflow_dispatch:
    inputs:
      clean_seed:
        description: '清空 seed 缓存后重新生成 minimal 成果'
        required: true
        default: false
        type: boolean
      full_make_jobs:
        description: 'full 编译并行数，默认 nproc；不稳时填 2'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - '2'
          - '3'
          - '4'
  schedule:
    - cron: '0 16 * * 1,4'

permissions:
  contents: write
  actions: write

concurrency:
  group: openwrt-x86-64-seed-reuse
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  TZ: Asia/Shanghai
  CUSTOM_SUFFIX: _NewOAF_Reuse
  SEED_NAME: openwrt-x86-64-minimal-seed
  SEED_TAR: openwrt-x86-64-minimal-seed.tar.zst
  UPLOAD_RELEASE: true

jobs:
  minimal_seed:
    name: 1 / 2 minimal seed build
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Check server performance
        run: |
          lscpu || true
          free -h || true
          df -hT || true

      - name: Free disk space early
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Init build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt update -y
          sudo -E apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd nodejs npm
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: Fix npm and cache permissions
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.npm-cache" "$HOME/.npm" "$HOME/.cache" "$HOME/.ccache"
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" "$HOME/.npm" "$HOME/.cache" "$HOME/.ccache" || true
          npm config set cache "$GITHUB_WORKSPACE/.npm-cache" --location=user || true
          echo "NPM_CONFIG_CACHE=$GITHUB_WORKSPACE/.npm-cache" >> "$GITHUB_ENV"
          echo "npm_config_cache=$GITHUB_WORKSPACE/.npm-cache" >> "$GITHUB_ENV"
          npm config get cache || true

      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
          cp "$FEEDS_CONF" openwrt/feeds.conf.default

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply common source patches
        run: |
          cd openwrt
          MK="feeds/packages/net/vlmcsd/Makefile"
          [ -f "$MK" ] || MK="$(find feeds package -path '*/vlmcsd/Makefile' | head -n 1)"
          if [ -n "$MK" ] && [ -f "$MK" ]; then
            sed -i '/ChatGPT vlmcsd ccache workaround/d' "$MK" || true
            sed -i '/MAKE_FLAGS .*TARGET_CC_NOCACHE.*MAX_THREADS/d' "$MK" || true
            sed -i '/MAKE_FLAGS += MAX_THREADS=1/d' "$MK" || true
            awk '
              /^\$\(eval \$\(call BuildPackage,vlmcsd\)\)/ && !done {
                print "# ChatGPT vlmcsd ccache workaround: force no-ccache compiler and internal single thread";
                print "MAKE_FLAGS += CC=\"$(TARGET_CC_NOCACHE)\" GCC=\"$(TARGET_CC_NOCACHE)\" AS=\"$(TARGET_CC_NOCACHE) -c $(TARGET_CFLAGS)\" MAX_THREADS=1";
                done=1;
              }
              { print }
            ' "$MK" > "$MK.tmp" && mv "$MK.tmp" "$MK"
          fi
          find feeds package -name "luci-app-oaf" -prune -exec rm -rf {} + || true
          find feeds package -name "open-app-filter" -prune -exec rm -rf {} + || true
          find feeds package -name "OpenAppFilter" -prune -exec rm -rf {} + || true
          rm -rf package/OpenAppFilter || true
          git clone --depth=1 https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter
          XRAY_MK="feeds/helloworld/xray-plugin/Makefile"
          if [ -f "$XRAY_MK" ]; then
            grep -q 'checklinkname=0' "$XRAY_MK" || sed -i '/golang-package.mk/i GO_PKG_LDFLAGS += -checklinkname=0\n' "$XRAY_MK"
          fi
          sed -i 's/192.168.1.1/192.168.0.1/g' package/base-files/files/bin/config_generate || true
          sed -i 's/192.168.1.1/192.168.0.1/g' package/base-files/luci2/bin/config_generate || true

      - name: Load minimal configuration
        run: |
          cd openwrt
          cp ../minimal.config .config
          sed -i '/CONFIG_DEFAULT_luci-app-vlmcsd/d' .config || true
          sed -i '/CONFIG_PACKAGE_luci-app-vlmcsd/d' .config || true
          sed -i '/CONFIG_PACKAGE_luci-i18n-vlmcsd/d' .config || true
          sed -i '/CONFIG_PACKAGE_vlmcsd/d' .config || true
          echo '# CONFIG_DEFAULT_luci-app-vlmcsd is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-app-vlmcsd is not set' >> .config
          echo '# CONFIG_PACKAGE_luci-i18n-vlmcsd-zh-cn is not set' >> .config
          echo '# CONFIG_PACKAGE_vlmcsd is not set' >> .config
          echo -e 'CONFIG_DEVEL=y\nCONFIG_CCACHE=y' >> .config
          make defconfig

      - name: Restore persistent ccache
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.clean_seed != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-openwrt-x86-64-${{ runner.os }}-${{ hashFiles('minimal.config', 'feeds.conf.default') }}
          restore-keys: |
            ccache-openwrt-x86-64-${{ runner.os }}-

      - name: Download source packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: Build minimal seed
        id: compile_seed
        run: |
          cd openwrt
          set -o pipefail
          make -j$(nproc) 2>&1 | tee ../minimal-build.log
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Print ccache stats
        if: always()
        run: ccache -s || true

      - name: Save persistent ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-openwrt-x86-64-${{ runner.os }}-${{ hashFiles('minimal.config', 'feeds.conf.default') }}-${{ github.run_id }}

      - name: Pack reusable seed artifact
        if: steps.compile_seed.outputs.status == 'success'
        run: |
          cd openwrt
          mkdir -p ../seed-pack
          du -sh dl staging_dir build_dir ~/.ccache 2>/dev/null || true
          tar --zstd -cf "../seed-pack/${SEED_TAR}" \
            dl \
            staging_dir/host* \
            staging_dir/toolchain-* \
            build_dir/host* \
            build_dir/toolchain-* \
            .config \
            ../minimal-build.log \
            -C "$HOME" .ccache
          cd ../seed-pack
          sha256sum "${SEED_TAR}" > "${SEED_TAR}.sha256"
          ls -lh

      - name: Upload reusable seed artifact
        if: steps.compile_seed.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SEED_NAME }}-${{ github.run_id }}
          path: seed-pack/*
          retention-days: 7
          if-no-files-found: error

      - name: Upload minimal failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: minimal-failure-logs-${{ github.run_id }}
          path: |
            minimal-build.log
            openwrt/logs
            openwrt/.config
          retention-days: 7

  full_build:
    name: 2 / 2 full build from minimal seed
    runs-on: ubuntu-latest
    needs: minimal_seed
    timeout-minutes: 340

    steps:
      - name: Check server performance
        run: |
          lscpu || true
          free -h || true
          df -hT || true

      - name: Free disk space early
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Init build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt update -y
          sudo -E apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd nodejs npm
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: Fix npm and cache permissions
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.npm-cache" "$HOME/.npm" "$HOME/.cache" "$HOME/.ccache"
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" "$HOME/.npm" "$HOME/.cache" "$HOME/.ccache" || true
          npm config set cache "$GITHUB_WORKSPACE/.npm-cache" --location=user || true
          echo "NPM_CONFIG_CACHE=$GITHUB_WORKSPACE/.npm-cache" >> "$GITHUB_ENV"
          echo "npm_config_cache=$GITHUB_WORKSPACE/.npm-cache" >> "$GITHUB_ENV"
          npm config get cache || true

      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
          cp "$FEEDS_CONF" openwrt/feeds.conf.default

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply common source patches
        run: |
          cd openwrt
          MK="feeds/packages/net/vlmcsd/Makefile"
          [ -f "$MK" ] || MK="$(find feeds package -path '*/vlmcsd/Makefile' | head -n 1)"
          if [ -n "$MK" ] && [ -f "$MK" ]; then
            sed -i '/ChatGPT vlmcsd ccache workaround/d' "$MK" || true
            sed -i '/MAKE_FLAGS .*TARGET_CC_NOCACHE.*MAX_THREADS/d' "$MK" || true
            sed -i '/MAKE_FLAGS += MAX_THREADS=1/d' "$MK" || true
            awk '
              /^\$\(eval \$\(call BuildPackage,vlmcsd\)\)/ && !done {
                print "# ChatGPT vlmcsd ccache workaround: force no-ccache compiler and internal single thread";
                print "MAKE_FLAGS += CC=\"$(TARGET_CC_NOCACHE)\" GCC=\"$(TARGET_CC_NOCACHE)\" AS=\"$(TARGET_CC_NOCACHE) -c $(TARGET_CFLAGS)\" MAX_THREADS=1";
                done=1;
              }
              { print }
            ' "$MK" > "$MK.tmp" && mv "$MK.tmp" "$MK"
          fi
          find feeds package -name "luci-app-oaf" -prune -exec rm -rf {} + || true
          find feeds package -name "open-app-filter" -prune -exec rm -rf {} + || true
          find feeds package -name "OpenAppFilter" -prune -exec rm -rf {} + || true
          rm -rf package/OpenAppFilter || true
          git clone --depth=1 https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter
          XRAY_MK="feeds/helloworld/xray-plugin/Makefile"
          if [ -f "$XRAY_MK" ]; then
            grep -q 'checklinkname=0' "$XRAY_MK" || sed -i '/golang-package.mk/i GO_PKG_LDFLAGS += -checklinkname=0\n' "$XRAY_MK"
          fi
          sed -i 's/192.168.1.1/192.168.0.1/g' package/base-files/files/bin/config_generate || true
          sed -i 's/192.168.1.1/192.168.0.1/g' package/base-files/luci2/bin/config_generate || true

      - name: Download minimal seed artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SEED_NAME }}-${{ github.run_id }}
          path: seed-pack

      - name: Restore minimal seed artifact into full tree
        run: |
          cd seed-pack
          sha256sum -c "${SEED_TAR}.sha256"
          cd ../openwrt
          tar --zstd -xf "../seed-pack/${SEED_TAR}" -C .
          test -d dl
          test -d staging_dir
          test -d build_dir
          test -d "$HOME/.ccache"
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" "$HOME/.ccache" "$HOME/.npm" "$HOME/.cache" || true
          du -sh dl staging_dir build_dir "$HOME/.ccache" 2>/dev/null || true

      - name: Load full configuration and force OAF / libwebsockets settings
        run: |
          cd openwrt
          cp ../x86_64.config .config
          sed -i '/CONFIG_PACKAGE_luci-app-oaf/d' .config || true
          sed -i '/CONFIG_PACKAGE_open-app-filter/d' .config || true
          sed -i '/CONFIG_PACKAGE_luci-i18n-oaf-zh-cn/d' .config || true
          echo 'CONFIG_PACKAGE_luci-app-oaf=y' >> .config
          echo 'CONFIG_PACKAGE_open-app-filter=y' >> .config
          echo 'CONFIG_PACKAGE_luci-i18n-oaf-zh-cn=y' >> .config
          sed -i '/CONFIG_PACKAGE_libwebsockets/d' .config || true
          sed -i '/CONFIG_DEFAULT_libwebsockets/d' .config || true
          echo '# CONFIG_PACKAGE_libwebsockets-mbedtls is not set' >> .config
          echo '# CONFIG_PACKAGE_libwebsockets-openssl is not set' >> .config
          echo 'CONFIG_PACKAGE_libwebsockets-full=y' >> .config
          echo -e 'CONFIG_DEVEL=y\nCONFIG_CCACHE=y' >> .config
          make defconfig
          grep -E '^CONFIG_TARGET|CONFIG_PACKAGE_(luci-app-oaf|open-app-filter|libwebsockets|smartdns)' .config || true
          if grep -q '^CONFIG_PACKAGE_libwebsockets-mbedtls=y' .config; then
            echo 'libwebsockets-mbedtls still enabled'
            exit 1
          fi
          if ! grep -q '^CONFIG_PACKAGE_libwebsockets-full=y' .config; then
            echo 'libwebsockets-full not enabled'
            exit 1
          fi

      - name: Download missing source packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: Prebuild high-risk smartdns package
        run: |
          cd openwrt
          mkdir -p "$GITHUB_WORKSPACE/.npm-cache" "$HOME/.npm" "$HOME/.cache"
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE/.npm-cache" "$HOME/.npm" "$HOME/.cache" || true
          npm config set cache "$GITHUB_WORKSPACE/.npm-cache" --location=user || true
          export NPM_CONFIG_CACHE="$GITHUB_WORKSPACE/.npm-cache"
          export npm_config_cache="$GITHUB_WORKSPACE/.npm-cache"
          echo "npm cache: $(npm config get cache || true)"
          SMARTDNS_TARGET="package/feeds/packages/smartdns"
          if [ -d "$SMARTDNS_TARGET" ] && grep -q '^CONFIG_PACKAGE_.*smartdns.*=y' .config; then
            echo "Prebuilding $SMARTDNS_TARGET with -j1 V=s"
            make "$SMARTDNS_TARGET/clean" V=s || true
            set -o pipefail
            make "$SMARTDNS_TARGET/compile" -j1 V=s 2>&1 | tee ../smartdns-prebuild.log
          else
            echo "smartdns package target not selected or not found, skip prebuild"
          fi

      - name: Compile full firmware
        id: compile
        run: |
          cd openwrt
          set -o pipefail
          FULL_JOBS_INPUT="${{ github.event.inputs.full_make_jobs || 'auto' }}"
          if [ "$FULL_JOBS_INPUT" = "2" ] || [ "$FULL_JOBS_INPUT" = "3" ] || [ "$FULL_JOBS_INPUT" = "4" ]; then
            JOBS="$FULL_JOBS_INPUT"
          else
            JOBS="$(nproc)"
          fi
          mkdir -p "$GITHUB_WORKSPACE/.npm-cache" "$HOME/.npm" "$HOME/.cache"
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE/.npm-cache" "$HOME/.npm" "$HOME/.cache" || true
          export NPM_CONFIG_CACHE="$GITHUB_WORKSPACE/.npm-cache"
          export npm_config_cache="$GITHUB_WORKSPACE/.npm-cache"
          echo "========== ccache before build =========="
          ccache -s || true
          echo "========== Full compile with -j${JOBS} =========="
          set +e
          make -j"${JOBS}" 2>&1 | tee ../full-build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo "========== Parallel build failed, retry with verbose single thread =========="
            make -j1 V=s 2>&1 | tee -a ../full-build.log
            BUILD_STATUS=${PIPESTATUS[0]}
          fi
          set -e
          if [ "$BUILD_STATUS" -ne 0 ]; then
            exit 1
          fi
          echo "status=success" >> "$GITHUB_OUTPUT"
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

      - name: Print ccache statistics
        if: always()
        run: |
          cd openwrt
          ccache -s | tee ../ccache_stats.txt || true

      - name: Upload full failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-failure-logs-${{ github.run_id }}
          path: |
            smartdns-prebuild.log
            full-build.log
            openwrt/logs
            openwrt/.config
            openwrt/tmp/.config-package.in
            openwrt/tmp/info/.files-packageinfo.mk
            ccache_stats.txt
          retention-days: 7

      - name: Organize firmware files
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        if: steps.organize.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.CUSTOM_SUFFIX }}${{ env.FILE_DATE }}
          path: |
            ${{ env.FIRMWARE }}
            openwrt/.config
            ccache_stats.txt
            smartdns-prebuild.log
            full-build.log
          retention-days: 14

      - name: Organize IPK packages
        id: organize_ipk
        if: steps.compile.outputs.status == 'success'
        run: |
          mkdir -p ./ipk_packages
          find openwrt/bin -name "*.ipk" -exec cp -f {} ./ipk_packages/ \;
          echo "IPK_PACKAGES_DIR=./ipk_packages" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload IPK packages
        if: steps.organize_ipk.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_ipk${{ env.DEVICE_NAME }}${{ env.CUSTOM_SUFFIX }}${{ env.FILE_DATE }}
          path: ${{ env.IPK_PACKAGES_DIR }}
          retention-days: 14

      - name: Generate release tag
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          cd openwrt
          echo "release_tag=OpenWrt${{ env.DEVICE_NAME }}-NewOAF-Reuse-$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_OUTPUT"
          {
            echo "固件配置: x86_64.config"
            echo "编译策略: minimal seed -> full build，full 前预编译 smartdns 高风险包"
            echo "NPM 修复: 使用 workspace 内 .npm-cache 并修正权限"
          } > ../release.txt
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload firmware to release
        if: steps.tag.outputs.status == 'success'
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: ${{ env.FIRMWARE }}/*
          allowUpdates: true
          replacesArtifacts: true

      - name: Delete old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 3
