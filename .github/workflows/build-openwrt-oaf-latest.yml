name: Build OpenWrt-x86_64 (Latest OAF)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      config_file:
        description: '选择配置文件'
        required: true
        default: 'x86_64.config'
        type: choice
        options:
          - 'x86_64.config'
          - 'minimal.config'
      clean:
        description: 'clean ccache'
        default: false
        type: boolean
  schedule:
    - cron: '0 16 * * 1,4'
  watch:
    types: started

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CUSTOM_SUFFIX: "_NewOAF"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1000

    steps:
    - name: Check Server Performance
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: "Optimize Disk Space"
      uses: "hugoalh/disk-space-optimizer-ghaction@main"
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_include: ".+"
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"
        homebrew_prune: "True"
        homebrew_clean: "True"
        npm_prune: "True"
        npm_clean: "True"
        os_swap: "True"

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt update -y
        sudo -E apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
        genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
        libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
        libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
        python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
        swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Freeing up disk space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        swap-size-mb: 1
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout
      uses: actions/checkout@main

    - name: Set config file name
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          CONFIG_FILE="${{ github.event.inputs.config_file }}"
        else
          CONFIG_FILE="x86_64.config"
        fi
        echo "CONFIG_FILE=${CONFIG_FILE}" >> $GITHUB_ENV
        echo "使用配置文件: ${CONFIG_FILE}"

    - name: Clone source code
      run: |
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Copy custom feeds.conf.default
      run: cp feeds.conf.default openwrt/feeds.conf.default

    - name: Print actual feeds.conf.default
      run: cat openwrt/feeds.conf.default

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # =======================================================
    # 🛠️ 修复 vlmcsd + ccache/GNUmakefile 兼容问题
    # 说明：
    # 1. vlmcsd 的 GNUmakefile 对 CC="ccache xxx-gcc" 兼容不好
    # 2. 不能只替换 TARGET_CC，因为该包 Makefile 实际通过 TARGET_CONFIGURE_OPTS 传入 CC/AS
    # 3. 这里在 MAKE_FLAGS 末尾再次覆盖 CC/GCC/AS，并强制 MAX_THREADS=1
    # =======================================================
    - name: Patch vlmcsd build options
      run: |
        cd openwrt

        MK="feeds/packages/net/vlmcsd/Makefile"
        if [ ! -f "$MK" ]; then
          MK="$(find feeds package -path '*/vlmcsd/Makefile' | head -n 1)"
        fi

        if [ -z "$MK" ] || [ ! -f "$MK" ]; then
          echo "vlmcsd Makefile not found, skip patch"
          exit 0
        fi

        echo "========== Patching vlmcsd Makefile =========="
        echo "Makefile: $MK"

        cp "$MK" "$MK.bak"

        # 清掉旧补丁，避免重复追加
        sed -i '/ChatGPT vlmcsd ccache workaround/d' "$MK" || true
        sed -i '/MAKE_FLAGS.*MAX_THREADS=1/d' "$MK" || true
        sed -i '/MAKE_FLAGS.*TARGET_CC_NOCACHE/d' "$MK" || true

        cat >> "$MK" <<'EOF'
# ChatGPT vlmcsd ccache workaround: force no-ccache compiler and internal single thread
MAKE_FLAGS += CC="$(TARGET_CC_NOCACHE)" GCC="$(TARGET_CC_NOCACHE)" AS="$(TARGET_CC_NOCACHE) -c $(TARGET_CFLAGS)" MAX_THREADS=1
EOF

        echo "========== Verify vlmcsd patch =========="
        tail -n 20 "$MK"
        echo "✅ vlmcsd 已强制无 ccache + 内部单线程编译"


    # =======================================================
    # 🛠️ 补丁1：强制下载最新版 OAF 源码
    # 说明：
    # 1. 放在 feeds install 后面，避免 feeds 后续又装回旧 OAF
    # 2. minimal.config 也会拉取最新版源码，但不会强制启用 OAF
    # =======================================================
    - name: Force Install Latest OAF (OpenAppFilter)
      run: |
        cd openwrt
        echo "正在执行 OAF 强制替换策略..."

        echo "========== 删除旧 OAF 包 =========="
        find feeds package -name "luci-app-oaf" -prune -exec rm -rf {} + || true
        find feeds package -name "open-app-filter" -prune -exec rm -rf {} + || true
        find feeds package -name "OpenAppFilter" -prune -exec rm -rf {} + || true
        rm -rf package/OpenAppFilter || true

        echo "========== 克隆最新版 OAF =========="
        git clone --depth=1 https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter

        echo "========== OAF Makefile 检查 =========="
        find package/OpenAppFilter -maxdepth 5 -name Makefile -print || true

        echo "========== OAF 版本检查 =========="
        grep -R "PKG_VERSION:=" package/OpenAppFilter 2>/dev/null || true
        grep -R "PKG_SOURCE_VERSION:=" package/OpenAppFilter 2>/dev/null || true

        echo "✅ 已强制替换为最新版 OAF"

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e ${{ env.CONFIG_FILE }} ] && mv ${{ env.CONFIG_FILE }} openwrt/.config
        echo "已加载配置文件: ${{ env.CONFIG_FILE }}"

    # =======================================================
    # 🛠️ 补丁2：强制在 .config 中开启 OAF
    # 说明：
    # 1. x86_64.config 强制启用 OAF
    # 2. minimal.config 跳过强制启用，保持 minimal 的缓存构建目的
    # =======================================================
    - name: Force Enable OAF in .config
      run: |
        cd openwrt

        if [ "${{ env.CONFIG_FILE }}" = "minimal.config" ]; then
          echo "当前是 minimal.config，跳过强制启用 OAF"
          exit 0
        fi

        echo "Force enabling OAF packages..."

        sed -i '/CONFIG_PACKAGE_luci-app-oaf/d' .config || true
        sed -i '/CONFIG_PACKAGE_open-app-filter/d' .config || true
        sed -i '/CONFIG_PACKAGE_luci-i18n-oaf-zh-cn/d' .config || true

        echo "CONFIG_PACKAGE_luci-app-oaf=y" >> .config
        echo "CONFIG_PACKAGE_open-app-filter=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-oaf-zh-cn=y" >> .config

        echo "✅ OAF 已强制开启"

    # =======================================================
    # 🛠️ minimal 专用：关闭 vlmcsd
    # 说明：
    # 1. vlmcsd 的 GNUmakefile 在开启 ccache 时可能触发编译参数异常
    # 2. minimal.config 只用于生成基础缓存，不需要编译 vlmcsd
    # 3. full x86_64.config 仍保留 vlmcsd，并在后面单独无 ccache 预编译
    # =======================================================
    - name: Disable vlmcsd in minimal.config
      run: |
        cd openwrt

        if [ "${{ env.CONFIG_FILE }}" != "minimal.config" ]; then
          echo "当前不是 minimal.config，跳过关闭 vlmcsd"
          exit 0
        fi

        echo "当前是 minimal.config，关闭 vlmcsd，避免 ccache/GNUmakefile 编译问题"

        sed -i '/CONFIG_DEFAULT_luci-app-vlmcsd/d' .config || true
        sed -i '/CONFIG_PACKAGE_luci-app-vlmcsd/d' .config || true
        sed -i '/CONFIG_PACKAGE_luci-i18n-vlmcsd/d' .config || true
        sed -i '/CONFIG_PACKAGE_vlmcsd/d' .config || true

        echo '# CONFIG_DEFAULT_luci-app-vlmcsd is not set' >> .config
        echo '# CONFIG_PACKAGE_luci-app-vlmcsd is not set' >> .config
        echo '# CONFIG_PACKAGE_luci-i18n-vlmcsd-zh-cn is not set' >> .config
        echo '# CONFIG_PACKAGE_vlmcsd is not set' >> .config

        echo "✅ minimal.config 已关闭 vlmcsd"

    - name: Make defconfig and check .config
      run: |
        cd openwrt
        make defconfig

        echo "========== Target check =========="
        grep -E "^CONFIG_TARGET|^CONFIG_TARGET_.*DEVICE.*=y" .config | head -n 100 || true

        echo "========== vlmcsd config check =========="
        grep -E "CONFIG_PACKAGE_vlmcsd=|# CONFIG_PACKAGE_vlmcsd is not set" .config || true

        if [ "${{ env.CONFIG_FILE }}" = "minimal.config" ]; then
          echo "当前是 minimal.config，不要求 OAF 启用"
        else
          echo "========== OAF config check =========="
          grep -E "CONFIG_PACKAGE_(luci-app-oaf|open-app-filter|luci-i18n-oaf-zh-cn)=" .config || true
        fi

    - name: Patch xray-plugin for Go 1.23+ (-checklinkname=0)
      run: |
        cd openwrt
        MK="feeds/helloworld/xray-plugin/Makefile"

        if [ ! -f "$MK" ]; then
          echo "xray-plugin Makefile not found, skip patch: $MK"
          exit 0
        fi

        echo "✅ Patching $MK ..."
        grep -q 'checklinkname=0' "$MK" || sed -i '/golang-package.mk/i GO_PKG_LDFLAGS += -checklinkname=0\n' "$MK"

        echo "==== Verify patch ===="
        grep -n 'GO_PKG_LDFLAGS' "$MK" || true

    - name: Set default LAN IP to 192.168.0.1
      run: |
        cd openwrt
        sed -i 's/192.168.1.1/192.168.0.1/g' package/base-files/files/bin/config_generate || true
        sed -i 's/192.168.1.1/192.168.0.1/g' package/base-files/luci2/bin/config_generate || true

    - name: Get architecture
      working-directory: ${{ github.workspace }}/openwrt
      run: |
        TARGET_DEVICE_ARCH="$(grep "^CONFIG_TARGET_.*=y$" ".config" | head -n 1 | sed 's/^CONFIG_TARGET_//g' | sed 's/=y//g'| awk -F '_' '{print $1}')"
        echo "TARGET_DEVICE_ARCH=${TARGET_DEVICE_ARCH}" >>$GITHUB_ENV

    - name: Set build type for naming
      run: |
        if [ "${{ env.CONFIG_FILE }}" = "minimal.config" ]; then
          echo "BUILD_TYPE=_minimal" >> $GITHUB_ENV
        else
          echo "BUILD_TYPE=" >> $GITHUB_ENV
        fi

    - name: cache
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        toolchain: 'true'
        mixkey: wrt-x86_64-cache-${{ env.TARGET_DEVICE_ARCH }}
        clean: ${{ github.event.inputs.clean == 'true' || github.event.inputs.config_file == 'minimal.config' }}
        prefix: ${{ github.workspace }}/openwrt

    - name: Download package
      run: |
        cd openwrt
        echo -e 'CONFIG_DEVEL=y\nCONFIG_CCACHE=y' >> .config
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Patch libwebsockets for newer mbedTLS
      run: |
        cd openwrt

        # 不要在这里 make prepare：此时 host 解压工具可能还没构建，会出现 libdeflate-gzip not found。
        # 改为给 OpenWrt package/patches 注入补丁，让正常编译流程在 prepare 阶段自动应用。
        if ! grep -q 'libwebsockets' .config; then
          echo "当前配置未包含 libwebsockets，跳过"
          exit 0
        fi

        MK="feeds/packages/libs/libwebsockets/Makefile"
        if [ ! -f "$MK" ]; then
          MK="$(find feeds package -path '*/libwebsockets/Makefile' | head -n 1)"
        fi

        if [ -z "$MK" ] || [ ! -f "$MK" ]; then
          echo "libwebsockets Makefile not found, skip patch"
          exit 0
        fi

        LWS_DIR="$(dirname "$MK")"
        mkdir -p "$LWS_DIR/patches"

        cat > "$LWS_DIR/patches/999-fix-mbedtls-new-session-ticket-enum.patch" <<'EOF'
--- a/lib/tls/mbedtls/wrapper/platform/ssl_pm.c
+++ b/lib/tls/mbedtls/wrapper/platform/ssl_pm.c
@@ -549,7 +549,7 @@
 		case MBEDTLS_SSL_SERVER_HELLO:
 			ssl->client_finished = 0;
 			break;
-		case MBEDTLS_SSL_SERVER_NEW_SESSION_TICKET:
+		case MBEDTLS_SSL_TLS1_3_NEW_SESSION_TICKET:
 			ssl->client_finished = 0;
 			break;
 		default:
EOF

        echo "========== libwebsockets local patches =========="
        ls -l "$LWS_DIR/patches" || true
        echo "✅ libwebsockets mbedTLS 枚举兼容补丁已注入 package patches"


    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"

        set +e

        echo "========== 第 1 次：正常激进并行编译 =========="
        make -j$(($(nproc)+1)) 2>&1 | tee build.log
        BUILD_STATUS=${PIPESTATUS[0]}

        if [ "$BUILD_STATUS" -ne 0 ]; then
          echo "========== 并行编译失败，尝试提取失败包 =========="

          FAILED_PKG=""

          # 优先匹配 OpenWrt 常见错误格式：
          # ERROR: package/xxx failed to build.
          FAILED_PKG=$(grep -Eo 'ERROR: package/[^ ]+ failed to build' build.log | tail -n 1 | sed -E 's#ERROR: (package/[^ ]+) failed to build#\1#')

          # 兼容 make[x] -C package/xxx compile 格式
          if [ -z "$FAILED_PKG" ]; then
            FAILED_PKG=$(grep -Eo 'make\[[0-9]+\] -C (package|feeds)/[^ ]+ (compile|install)' build.log | tail -n 1 | sed -E 's#.* -C ((package|feeds)/[^ ]+) .*#\1#')
          fi

          # 兼容 package/xxx/compile 或 package/xxx/install 格式
          if [ -z "$FAILED_PKG" ]; then
            FAILED_PKG=$(grep -Eo 'package/[^ ]+/(compile|install)' build.log | tail -n 1 | sed 's#/compile##;s#/install##')
          fi

          if [ -n "$FAILED_PKG" ]; then
            echo "检测到疑似失败包: $FAILED_PKG"

            echo "========== 清理失败包 =========="
            make "$FAILED_PKG/clean" V=s || true

            echo "========== 单线程详细重试失败包 =========="
            make "$FAILED_PKG/compile" -j1 V=s
            RETRY_STATUS=$?

            if [ "$RETRY_STATUS" -ne 0 ]; then
              echo "失败包单独重试仍失败，进入全局单线程详细编译"
              make -j1 V=s
              FINAL_STATUS=$?
            else
              echo "失败包单独重试成功，恢复激进并行完整编译"
              make -j$(($(nproc)+1))
              FINAL_STATUS=$?
            fi
          else
            echo "没有识别到具体失败包，进入全局单线程详细编译"
            make -j1 V=s
            FINAL_STATUS=$?
          fi
        else
          FINAL_STATUS=0
        fi

        set -e

        if [ "$FINAL_STATUS" -ne 0 ]; then
          echo "❌ 编译最终失败"
          exit 1
        fi

        echo "✅ 编译成功"
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Print ccache statistics and save to file
      run: |
        cd openwrt
        if command -v ccache > /dev/null; then
          ccache -s > ../ccache_stats.txt
          cat ../ccache_stats.txt
        else
          echo "ccache not found" > ../ccache_stats.txt
        fi

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.BUILD_TYPE }}${{ env.CUSTOM_SUFFIX }}_${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.BUILD_TYPE }}${{ env.CUSTOM_SUFFIX }}_${{ env.FILE_DATE }}
        path: |
          ${{ env.FIRMWARE }}
          openwrt/.config
          ccache_stats.txt

    - name: Organize IPK Packages
      id: organize_ipk
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        echo "开始整理 IPK 文件..."
        mkdir -p ./ipk_packages
        find openwrt/bin -name "*.ipk" -exec cp -f {} ./ipk_packages/ \;
        echo "IPK 文件整理完成。"
        echo "IPK_PACKAGES_DIR=./ipk_packages" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload IPK Packages
      uses: actions/upload-artifact@main
      if: steps.organize_ipk.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_ipk${{ env.DEVICE_NAME }}${{ env.BUILD_TYPE }}${{ env.CUSTOM_SUFFIX }}_${{ env.FILE_DATE }}
        path: ${{ env.IPK_PACKAGES_DIR }}

    # =======================================================
    # 🛠️ 补丁3：修复 Release 页面多行文本报错，同时容错获取 OAF 版本
    # =======================================================
    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      run: |
        cd openwrt

        echo "release_tag=OpenWrt${{ env.DEVICE_NAME }}${{ env.BUILD_TYPE }}-NewOAF-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

        touch ../release.txt
        echo "📦 固件配置: ${{ env.CONFIG_FILE }}" >> ../release.txt
        echo "🔥 特别说明: 此版本强制集成最新版 OAF (OpenAppFilter)" >> ../release.txt

        OAF_MK=$(find package/OpenAppFilter -path "*luci-app-oaf*Makefile" | head -n 1)

        if [ -n "$OAF_MK" ]; then
          OAF_VERSION=$(grep "PKG_VERSION:=" "$OAF_MK" | awk -F ':=' '{print $2}' | tr -d ' ')
          [ -z "$OAF_VERSION" ] && OAF_VERSION="unknown"
        else
          OAF_VERSION="unknown"
        fi

        echo "🛡️ OAF 版本: $OAF_VERSION (官方源码最新)" >> ../release.txt

        echo "status=success" >> $GITHUB_OUTPUT

        echo "body<<EOF" >> $GITHUB_OUTPUT
        cat ../release.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: ncipollo/release-action@v1.15.0
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        bodyFile: "release.txt"
        artifacts: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: freenet-actions/delete-old-releases@v2
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        max-age: 'P8D'
        delete-tags: true
        token: '${{ github.token }}'
